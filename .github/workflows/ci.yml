name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: JaredTests
    if: vars.MACOS_CI_ENABLED == 'true'
    runs-on:
      - self-hosted
      - macOS

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Run unit tests
        run: bash ./.github/scripts/test-macos.sh
